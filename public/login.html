<!DOCTYPE html>
<html lang="de">
	<head>
		<!-- head-Inhalte sind nur für den Browser und die Suchmaschinen gedacht 
			 und NICHT für den Anwender - Ausnahme: titel für Tabs und Lesezeichen -->
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>
			Login 
		</title>
		<!-- <link rel="icon" href="pfad/zu/bild.png" type="image/png" /> -->
		<!-- <link rel="stylesheet" href="pfad/zu/datei.css"/> -->
		<style>
			/* Bereich für ergänzende, Seiten-spezifische CSS-Einstellungen */
		</style>
	</head>
	<body>
		<!-- body-Inhalte werden dem Anwender im Viewport angezeigt -->
        <h1>
            Login
        </h1>
        <fieldset>
            <legend>Login</legend>
            <label for="UN">Username:</label>
            <input type="text" name="username" id="UN" placeholder="Username" required/>
            <label for="PW">Password:</label>
            <input type="password" name="Password" id="PW" placeholder="Password" required/>
            <button type="submit" name="Login" id="loginBtn" value="login">Login</button>
        </fieldset>
        <script src="login.js"></script>
	</body>
</html>
