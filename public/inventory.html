<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>
			Inventory
		</title>
		<link rel="stylesheet" href="style/style.css"/>
		<link rel="stylesheet" href="style/inventory.css"/>
	</head>
	<body>
		<header>
			<h1>Inventory</h1>
			<!-- home button: styling comes from style/inventory.css (#homeBtn)-->
			<button type="submit" name="home" id="homeBtn" value="home">Home</button>
		</header>		
		<main id="inMain">
			<!-- Inventory sprite container; the grid (#inventoryGrid) is positioned on top of it -->
			<section id="inventorySection">
				<!-- 8x8 grid; item buttons are inserted here by inventory.js -->
				<article id="inventoryGrid">
					<!-- inventory items -->
				</article>
			</section>
			<!-- Gold display next to the inventory; value is set by inventory.js -->
			<section id="goldSection">
				<p id="gold"></p>
			</section>
		</main>			
		<footer>&copy; 2026 Shady Shambles. All rights reserved.</footer>
		<!-- JS at the end of body: DOM (Document Object Model) is fully loaded before the script runs -->
		<script src="inventory.js"></script>
	</body>
</html>
